services:
  postgres:
    image: postgres:16-alpine
    container_name: tachyon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tachyon
      POSTGRES_USER: tachyon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tachyon"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: tachyon-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://tachyon:${POSTGRES_PASSWORD}@postgres:5432/tachyon
      API_SECRET: ${API_SECRET}
      TZ: Asia/Seoul
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
